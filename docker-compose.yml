version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: maims_db
      POSTGRES_USER: maims_user
      POSTGRES_PASSWORD: maims_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maims_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./maims-project/backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://maims_user:maims_password@db:5432/maims_db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./maims-project/backend:/app
    networks:
      - maims-network

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - maims-network

volumes:
  postgres_data:

networks:
  maims-network:
    driver: bridge
